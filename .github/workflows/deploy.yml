name: CI/CD with SSH

on:
  push:
    branches: [ main ] # main 브랜치에 push하면 시작

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 # 본인 Java 버전에 맞게 수정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # 캐시 활성화 - 이후 처리속도 up

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar

      # 빌드된 JAR 파일을 EC2로 전송 (이미 등록한 Secrets 사용)
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/comprag-app.jar"
          target: "/home/${{ secrets.EC2_USERNAME }}/app"
          strip_components: 2 # build/libs 경로를 제외하고 파일만 전송

      # 스크립트 전송
      - name: Copy Script to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "scripts/deploy.sh" # 프로젝트 내 실제 경로를 적으세요!
          target: "/home/${{ secrets.EC2_USERNAME }}/app"
          strip_components: 1

      # EC2에 접속해서 배포 스크립트 실행
      - name: Execute Remote Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.EC2_USERNAME }}/app
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            chmod +x /home/${{ secrets.EC2_USERNAME }}/app/deploy.sh
            /home/${{ secrets.EC2_USERNAME }}/app/deploy.sh