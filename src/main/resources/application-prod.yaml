spring:

  #docker postgres 연결
  datasource:
    url: jdbc:postgresql://localhost:5432/comprag
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
    ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    jwt:
      secret: "dev-only-super-long-secret-key-dev-only-super-long-secret-key"
      access-token-exp-minutes: 60

  logging:
    level:
      org.springframework.security: DEBUG

  jackson:
    time-zone: Asia/Seoul
spring.jpa.properties.hibernate.jdbc.time_zone: UTC