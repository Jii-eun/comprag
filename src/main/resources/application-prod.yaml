spring:

  #docker postgres 연결
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/compRAG
    username: compRAG
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  #H2 데이터베이스연결
#  datasource:
#    url: jdbc:h2:mem:devdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
#    driver-class-name: org.h2.Driver
#    username: sa
#    password: ${DB_PASSWORD}
    # 상단 프로젝트명 - edit Configuration - Environment variable 편집
    # dev로 실행하도록 하려면 -> SPRING_PROFILES_ACTIVE=dev 를 환경변수에 추가
    # DB_PASSWORD 여기에 저장 (디렉토리에 파일로 만든거 import도 가능한 것 같음)

  jpa:
    hibernate:
#      ddl-auto: update  # 엔티티 변경에 맞춰 “가능한 선에서” 테이블을 수정 -> Hibernate가 DB 임의 변경 가능
      ddl-auto: validate  # 엔티티-스키마 불일치 감지만 가능
    #    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
#    baseline-on-migrate: true # 이미 운영 중인 기존 DB에 Flyway를 얹을 때 쓰는 옵션

  security:
    jwt:
      secret: "dev-only-super-long-secret-key-dev-only-super-long-secret-key"
      access-token-exp-minutes: 60


  logging:
    level:
      org.springframework.security: DEBUG
#      org.hibernate.SQL: debug
#      org.hibernate.orm.jdbc.bind: trace

#  h2:
#    console:
#      enabled: true
#      path: /h2-console

  jackson:
    time-zone: Asia/Seoul
spring.jpa.properties.hibernate.jdbc.time_zone: UTC